<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemistry Calculator</title>
  <style>
    /* ── CSS Custom Properties ─────────────────────────── */
    :root {
      --bg:        #0f1117;
      --calc-bg:   #1a1d2e;
      --screen-bg: #0a1a0a;
      --screen-fg: #33ff66;
      --screen-dim:#1a8a33;
      --border:    #2a2d3e;
      --btn-bg:    #252838;
      --btn-fg:    #c8cce8;
      --btn-mod:   #1e3a5f;
      --btn-mod-fg:#7ab8ff;
      --btn-calc:  #2d5a2d;
      --btn-calc-fg:#5dff7a;
      --btn-active:#3a7aff;
      --btn-active-fg:#fff;
      --label-fg:  #6b6f8a;
      --input-bg:  #1a1d2e;
      --input-fg:  #c8cce8;
      --input-br:  #3a3d5e;
      --result-ok: #33ff66;
      --result-err:#ff4444;
      --shadow:    0 8px 32px rgba(0,0,0,0.6);
    }
    [data-theme="light"] {
      --bg:        #d4d8e8;
      --calc-bg:   #e8eaf6;
      --screen-bg: #c8d4c0;
      --screen-fg: #1a3a1a;
      --screen-dim:#4a7a4a;
      --border:    #b0b4c8;
      --btn-bg:    #d0d4e8;
      --btn-fg:    #1a1d3a;
      --btn-mod:   #b8cce8;
      --btn-mod-fg:#1a3a6a;
      --btn-calc:  #b0d4b0;
      --btn-calc-fg:#1a3a1a;
      --btn-active:#3a7aff;
      --btn-active-fg:#fff;
      --label-fg:  #6060a0;
      --input-bg:  #f4f4fc;
      --input-fg:  #1a1d3a;
      --input-br:  #a0a4c0;
      --result-ok: #1a6a1a;
      --result-err:#cc0000;
      --shadow:    0 8px 32px rgba(0,0,0,0.15);
    }

    /* ── Reset / Base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 20px 8px 40px;
      font-family: 'Segoe UI', Arial, sans-serif;
      transition: background 0.3s;
    }

    /* ── Calculator Shell ──────────────────────────────── */
    .calc {
      background: var(--calc-bg);
      border: 2px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow);
      padding: 16px 14px 20px;
      transition: background 0.3s, border-color 0.3s;
    }

    /* ── Header ────────────────────────────────────────── */
    .calc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .brand {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--label-fg);
      text-transform: uppercase;
    }
    .brand span { color: var(--btn-active); }
    .theme-btn {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      color: var(--btn-fg);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .theme-btn:hover { background: var(--btn-active); color: #fff; }

    /* ── LCD Screen ────────────────────────────────────── */
    .screen {
      background: var(--screen-bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      min-height: 80px;
      position: relative;
      overflow: hidden;
    }
    .screen-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--screen-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .screen-content {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: var(--screen-fg);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
      min-height: 40px;
    }
    .screen-content.error { color: var(--result-err); }
    .screen-prompt {
      font-size: 10px;
      color: var(--screen-dim);
      margin-top: 4px;
    }

    /* ── Module Grid ───────────────────────────────────── */
    .mod-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-bottom: 12px;
    }
    .mod-btn {
      background: var(--btn-mod);
      color: var(--btn-mod-fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 2px;
      font-size: 9px;
      text-align: center;
      cursor: pointer;
      line-height: 1.3;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }
    .mod-btn:hover { background: var(--btn-active); color: var(--btn-active-fg); }
    .mod-btn.active { background: var(--btn-active); color: var(--btn-active-fg); font-weight: 700; }
    .mod-btn:active { transform: scale(0.95); }
    .mod-num { font-size: 8px; opacity: 0.7; display: block; }

    /* ── Input Panel ───────────────────────────────────── */
    .input-panel {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 10px 6px;
      margin-bottom: 10px;
      min-height: 60px;
    }
    .panel-title {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--label-fg);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .field-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .field-row label {
      font-size: 10px;
      color: var(--label-fg);
      min-width: 80px;
      flex-shrink: 0;
    }
    .field-row input,
    .field-row select,
    .field-row textarea {
      flex: 1;
      min-width: 0;
      background: var(--input-bg);
      color: var(--input-fg);
      border: 1px solid var(--input-br);
      border-radius: 5px;
      padding: 5px 7px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      transition: border-color 0.2s;
      outline: none;
    }
    .field-row input:focus,
    .field-row select:focus,
    .field-row textarea:focus { border-color: var(--btn-active); }
    .field-row textarea { resize: vertical; min-height: 32px; font-size: 11px; }

    .dynamic-rows { margin-top: 4px; }
    .dyn-row {
      display: flex;
      gap: 5px;
      margin-bottom: 5px;
      align-items: center;
      flex-wrap: wrap;
    }
    .dyn-row input {
      background: var(--input-bg);
      color: var(--input-fg);
      border: 1px solid var(--input-br);
      border-radius: 5px;
      padding: 4px 6px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      outline: none;
    }
    .dyn-row input:focus { border-color: var(--btn-active); }
    .dyn-row input.w-sm { width: 52px; }
    .dyn-row input.w-md { width: 80px; }
    .dyn-row input.w-lg { width: 110px; }
    .dyn-row .dyn-label { font-size: 9px; color: var(--label-fg); }
    .add-row-btn, .rem-row-btn {
      background: none;
      border: 1px solid var(--input-br);
      color: var(--label-fg);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .add-row-btn:hover { border-color: var(--btn-active); color: var(--btn-active); }
    .rem-row-btn:hover { border-color: var(--result-err); color: var(--result-err); }

    .radio-row {
      display: flex;
      gap: 12px;
      margin-bottom: 6px;
    }
    .radio-row label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--btn-fg);
      cursor: pointer;
    }

    /* ── Calculate Button ──────────────────────────────── */
    .calc-btn {
      width: 100%;
      background: var(--btn-calc);
      color: var(--btn-calc-fg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .calc-btn:hover { background: var(--btn-active); color: #fff; }
    .calc-btn:active { transform: scale(0.98); }

    /* ── Utility ───────────────────────────────────────── */
    .hidden { display: none !important; }
    .sep { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  </style>
</head>
<body>

<div class="calc">

  <!-- Header -->
  <div class="calc-header">
    <div class="brand"><span>Chem</span>Calc FX-17</div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀ Light</button>
  </div>

  <!-- LCD Screen -->
  <div class="screen">
    <div class="screen-label">Output</div>
    <div class="screen-content" id="screenOut">Select a module below.</div>
    <div class="screen-prompt" id="screenPrompt"></div>
  </div>

  <!-- Module Selector Grid -->
  <div class="mod-grid">
    <button class="mod-btn" onclick="selectMod(1)"><span class="mod-num">01</span>Mole Conv.</button>
    <button class="mod-btn" onclick="selectMod(2)"><span class="mod-num">02</span>Empirical Formula</button>
    <button class="mod-btn" onclick="selectMod(3)"><span class="mod-num">03</span>Eqn Balancer</button>
    <button class="mod-btn" onclick="selectMod(4)"><span class="mod-num">04</span>Lim. Reactant</button>
    <button class="mod-btn" onclick="selectMod(5)"><span class="mod-num">05</span>% Comp.</button>
    <button class="mod-btn" onclick="selectMod(6)"><span class="mod-num">06</span>Vol/Mass</button>
    <button class="mod-btn" onclick="selectMod(7)"><span class="mod-num">07</span>Oxidation #</button>
    <button class="mod-btn" onclick="selectMod(8)"><span class="mod-num">08</span>Atom Economy</button>
    <button class="mod-btn" onclick="selectMod(9)"><span class="mod-num">09</span>Ionic Bond</button>
    <button class="mod-btn" onclick="selectMod(10)"><span class="mod-num">10</span>% Yield</button>
    <button class="mod-btn" onclick="selectMod(11)"><span class="mod-num">11</span>Periodic Table</button>
    <button class="mod-btn" onclick="selectMod(12)"><span class="mod-num">12</span>Gas Laws</button>
    <button class="mod-btn" onclick="selectMod(13)"><span class="mod-num">13</span>Acid-Base</button>
    <button class="mod-btn" onclick="selectMod(14)"><span class="mod-num">14</span>Thermo.</button>
    <button class="mod-btn" onclick="selectMod(15)"><span class="mod-num">15</span>ICE Solver</button>
    <button class="mod-btn" onclick="selectMod(16)"><span class="mod-num">16</span>Electrochem.</button>
    <button class="mod-btn" onclick="selectMod(17)"><span class="mod-num">17</span>Kinetics</button>
  </div>

  <!-- Input Panel (changes per module) -->
  <div class="input-panel" id="inputPanel">
    <div class="panel-title" id="panelTitle">No module selected</div>
    <div id="panelBody"></div>
  </div>

  <!-- Calculate -->
  <button class="calc-btn" onclick="calculate()">= Calculate</button>

</div>

<script>
/* ════════════════════════════════════════════════════════
   Theme toggle
════════════════════════════════════════════════════════ */
function toggleTheme() {
  const html = document.documentElement;
  const btn  = document.getElementById('themeBtn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.setAttribute('data-theme', 'light');
    btn.textContent = '☽ Dark';
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀ Light';
  }
}

/* ════════════════════════════════════════════════════════
   Screen output helpers
════════════════════════════════════════════════════════ */
function showResult(text) {
  const el = document.getElementById('screenOut');
  el.textContent = text;
  el.className = 'screen-content';
  document.getElementById('screenPrompt').textContent = '';
}
function showError(text) {
  const el = document.getElementById('screenOut');
  el.textContent = 'ERROR: ' + text;
  el.className = 'screen-content error';
  document.getElementById('screenPrompt').textContent = '';
}
function showPrompt(text) {
  document.getElementById('screenPrompt').textContent = text;
}

/* ════════════════════════════════════════════════════════
   Module selector
════════════════════════════════════════════════════════ */
let currentMod = 0;
const MOD_NAMES = {
  1:  'Mole Conversions',
  2:  'Empirical Formula',
  3:  'Equation Balancer',
  4:  'Limiting Reactant',
  5:  'Percent Composition',
  6:  'Volume / Mass',
  7:  'Oxidation Numbers',
  8:  'Atom Economy',
  9:  'Ionic Bonding',
  10: 'Percentage Yield',
  11: 'Periodic Table',
  12: 'Gas Laws',
  13: 'Acid-Base',
  14: 'Thermodynamics',
  15: 'ICE Solver',
  16: 'Electrochemistry',
  17: 'Kinetics',
};

function selectMod(n) {
  currentMod = n;
  document.querySelectorAll('.mod-btn').forEach((b, i) => {
    b.classList.toggle('active', i + 1 === n);
  });
  document.getElementById('panelTitle').textContent = MOD_NAMES[n];
  renderPanel(n);
  showResult('Module ' + String(n).padStart(2,'0') + ' — ' + MOD_NAMES[n]);
  showPrompt('Enter values and press = Calculate');
}

/* ════════════════════════════════════════════════════════
   Panel renderers
════════════════════════════════════════════════════════ */
function renderPanel(n) {
  const body = document.getElementById('panelBody');
  body.innerHTML = '';
  const fn = PANELS[n];
  if (fn) fn(body);
}

const PANELS = {
  /* ── 1. Mole Conversions ─────────────────────────── */
  1(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Conversion</label>
        <select id="moleType" onchange="updateMoleFields()">
          <option value="mass_to_moles">Mass → Moles</option>
          <option value="moles_to_mass">Moles → Mass</option>
          <option value="moles_to_particles">Moles → Particles</option>
          <option value="particles_to_moles">Particles → Moles</option>
          <option value="moles_to_volume">Moles → Volume (STP)</option>
          <option value="volume_to_moles">Volume → Moles (STP)</option>
        </select>
      </div>
      <div id="moleFields"></div>`;
    updateMoleFields();
  },

  /* ── 2. Empirical Formula ────────────────────────── */
  2(body) {
    body.innerHTML = `
      <div class="panel-title" style="margin-bottom:4px">Elements &amp; Masses (g)</div>
      <div class="dynamic-rows" id="empRows"></div>
      <button class="add-row-btn" onclick="addEmpRow()">+ Add Element</button>`;
    addEmpRow(); addEmpRow();
  },

  /* ── 3. Equation Balancer ────────────────────────── */
  3(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Equation</label>
        <input id="eqInput" type="text" placeholder="H2 + O2 -> H2O" />
      </div>
      <div style="font-size:9px;color:var(--label-fg);margin-top:2px">
        Use -> to separate reactants and products. Use + between compounds.
      </div>`;
  },

  /* ── 4. Limiting Reactant ────────────────────────── */
  4(body) {
    body.innerHTML = `
      <div style="font-size:9px;color:var(--label-fg);margin-bottom:4px">Reactants (name, coefficient, moles)</div>
      <div class="dynamic-rows" id="limRRows"></div>
      <button class="add-row-btn" onclick="addLimR()">+ Reactant</button>
      <hr class="sep">
      <div style="font-size:9px;color:var(--label-fg);margin-bottom:4px">Products (name, coefficient)</div>
      <div class="dynamic-rows" id="limPRows"></div>
      <button class="add-row-btn" onclick="addLimP()">+ Product</button>`;
    addLimR(); addLimR();
    addLimP();
  },

  /* ── 5. Percent Composition ──────────────────────── */
  5(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Formula</label>
        <input id="pctFormula" type="text" placeholder="H2O, CuSO4, Fe2O3..." />
      </div>`;
  },

  /* ── 6. Volume / Mass ────────────────────────────── */
  6(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Conversion</label>
        <select id="volType" onchange="updateVolFields()">
          <option value="mass_to_volume">Mass → Volume</option>
          <option value="volume_to_mass">Volume → Mass</option>
          <option value="density">Density (from m &amp; V)</option>
        </select>
      </div>
      <div id="volFields"></div>`;
    updateVolFields();
  },

  /* ── 7. Oxidation Numbers ────────────────────────── */
  7(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Formula</label>
        <input id="oxFormula" type="text" placeholder="KMnO4, H2SO4..." />
      </div>
      <div class="field-row">
        <label>Ion charge</label>
        <input id="oxCharge" type="number" value="0" style="width:60px;flex:none" />
        <span style="font-size:9px;color:var(--label-fg)">(0 = neutral)</span>
      </div>
      <div class="field-row">
        <label style="min-width:auto">
          <input type="checkbox" id="oxPeroxide" style="width:auto;flex:none" />
          &nbsp;Peroxide compound
        </label>
      </div>`;
  },

  /* ── 8. Atom Economy ─────────────────────────────── */
  8(body) {
    body.innerHTML = `
      <div style="font-size:9px;color:var(--label-fg);margin-bottom:4px">Reactants (formula, coefficient)</div>
      <div class="dynamic-rows" id="aeRRows"></div>
      <button class="add-row-btn" onclick="addAER()">+ Reactant</button>
      <hr class="sep">
      <div style="font-size:9px;color:var(--label-fg);margin-bottom:4px">Desired product</div>
      <div class="dyn-row">
        <input class="w-lg" id="aeDesiredFormula" placeholder="formula" />
        <span class="dyn-label">coeff</span>
        <input class="w-sm" id="aeDesiredCoeff" value="1" />
      </div>`;
    addAER(); addAER();
  },

  /* ── 9. Ionic Bonding ────────────────────────────── */
  9(body) {
    body.innerHTML = `
      <div class="radio-row">
        <label><input type="radio" name="ionicAction" value="classify" checked onchange="updateIonicFields()"> Classify bond</label>
        <label><input type="radio" name="ionicAction" value="formula" onchange="updateIonicFields()"> Write formula</label>
      </div>
      <div id="ionicFields"></div>`;
    updateIonicFields();
  },

  /* ── 10. Percentage Yield ────────────────────────── */
  10(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Find</label>
        <select id="yieldType" onchange="updateYieldFields()">
          <option value="percent">% Yield (actual &amp; theoretical known)</option>
          <option value="actual">Actual yield (% &amp; theoretical known)</option>
          <option value="theoretical">Theoretical yield (actual &amp; % known)</option>
        </select>
      </div>
      <div id="yieldFields"></div>`;
    updateYieldFields();
  },

  /* ── 11. Periodic Table ──────────────────────────── */
  11(body) {
    body.innerHTML = `
      <div class="radio-row">
        <label><input type="radio" name="perType" value="symbol" checked> Symbol</label>
        <label><input type="radio" name="perType" value="name"> Name</label>
        <label><input type="radio" name="perType" value="number"> Atomic #</label>
      </div>
      <div class="field-row">
        <label>Search</label>
        <input id="perQuery" type="text" placeholder="e.g. Fe / Iron / 26" />
      </div>`;
  },

  /* ── 12. Gas Laws ────────────────────────────────── */
  12(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Law</label>
        <select id="gasType" onchange="updateGasFields()">
          <option value="ideal">Ideal Gas Law (PV=nRT)</option>
          <option value="combined">Combined Gas Law</option>
          <option value="graham">Graham's Effusion</option>
          <option value="dalton">Dalton's Partial Pressure</option>
        </select>
      </div>
      <div id="gasFields"></div>`;
    updateGasFields();
  },

  /* ── 13. Acid-Base ───────────────────────────────── */
  13(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Type</label>
        <select id="abType" onchange="updateABFields()">
          <option value="ph_convert">pH / [H⁺] / [OH⁻] Converter</option>
          <option value="strong_acid">Strong Acid → pH</option>
          <option value="strong_base">Strong Base → pH</option>
          <option value="weak_acid">Weak Acid → pH</option>
          <option value="weak_base">Weak Base → pH</option>
          <option value="buffer">Buffer pH (Henderson-Hasselbalch)</option>
          <option value="identify">Identify Acid/Base</option>
        </select>
      </div>
      <div id="abFields"></div>`;
    updateABFields();
  },

  /* ── 14. Thermodynamics ──────────────────────────── */
  14(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Type</label>
        <select id="thermoType" onchange="updateThermoFields()">
          <option value="calorimetry">Calorimetry (q = mcΔT)</option>
          <option value="hess">Hess's Law</option>
          <option value="bond">Bond Enthalpy</option>
          <option value="gibbs">Gibbs Free Energy (ΔG = ΔH − TΔS)</option>
        </select>
      </div>
      <div id="thermoFields"></div>`;
    updateThermoFields();
  },

  /* ── 15. ICE Solver ──────────────────────────────── */
  15(body) {
    body.innerHTML = `
      <div style="font-size:9px;color:var(--label-fg);margin-bottom:4px">Reactants (name, coeff, initial mol/L)</div>
      <div class="dynamic-rows" id="iceRRows"></div>
      <button class="add-row-btn" onclick="addIceR()">+ Reactant</button>
      <hr class="sep">
      <div style="font-size:9px;color:var(--label-fg);margin-bottom:4px">Products (name, coeff, initial mol/L)</div>
      <div class="dynamic-rows" id="icePRows"></div>
      <button class="add-row-btn" onclick="addIceP()">+ Product</button>
      <hr class="sep">
      <div class="field-row">
        <label>Kc</label>
        <input id="iceKc" type="number" step="any" placeholder="e.g. 0.04" />
      </div>`;
    addIceR(); addIceR();
    addIceP();
  },

  /* ── 16. Electrochemistry ────────────────────────── */
  16(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Type</label>
        <select id="ecType" onchange="updateECFields()">
          <option value="cell">Cell Potential &amp; ΔG</option>
          <option value="faraday">Faraday's Law</option>
          <option value="nernst">Nernst Equation</option>

/* ════════════════════════════════════════════════════════
   API helpers
════════════════════════════════════════════════════════ */
async function post(url, data) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  return res.json();
}

function val(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

/* ════════════════════════════════════════════════════════
   Calculate dispatcher
════════════════════════════════════════════════════════ */
async function calculate() {
  if (!currentMod) { showError('Select a module first.'); return; }
  showResult('Calculating...');
  try {
    await CALCS[currentMod]();
  } catch(e) {
    showError(e.message || String(e));
  }
}

const CALCS = {
  /* ── 1. Mole Conversions ─────────────────────────── */
  async 1() {
    const t = val('moleType');
    const a = val('mA');
    const b = document.getElementById('mB') ? val('mB') : null;
    if (!a) { showError('Enter a value.'); return; }
    const body = { type: t, a };
    if (b !== null) body.b = b;
    const d = await post('/api/mole', body);
    if (d.error) { showError(d.error); return; }
    showResult(`Result: ${d.result.toExponential ? d.result : d.result} ${d.unit}`);
    showPrompt('');
  },

  /* ── 2. Empirical Formula ────────────────────────── */
  async 2() {
    const rows = document.querySelectorAll('#empRows .dyn-row');
    const elements = [], masses = [];
    rows.forEach(r => {
      const ins = r.querySelectorAll('input');
      if (ins[0].value.trim()) {
        elements.push(ins[0].value.trim());
        masses.push(ins[1].value.trim());
      }
    });
    if (elements.length < 1) { showError('Add at least one element.'); return; }
    const d = await post('/api/empirical', { elements, masses });
    if (d.error) { showError(d.error); return; }
    showResult(`Empirical Formula:\n${d.formula}`);
  },

  /* ── 3. Equation Balancer ────────────────────────── */
  async 3() {
    const eq = val('eqInput');
    if (!eq) { showError('Enter an equation.'); return; }
    const d = await post('/api/equation', { equation: eq });
    if (d.error) { showError(d.error); return; }
    showResult(`Balanced:\n${d.balanced}`);
  },

  /* ── 4. Limiting Reactant ────────────────────────── */
  async 4() {
    const rRows = document.querySelectorAll('#limRRows .dyn-row');
    const pRows = document.querySelectorAll('#limPRows .dyn-row');
    const reactants = [], products = [];
    rRows.forEach(r => {
      const ins = r.querySelectorAll('input');
      if (ins[0].value.trim()) reactants.push({ name: ins[0].value.trim(), coeff: ins[1].value, moles: ins[2].value });
    });
    pRows.forEach(r => {
      const ins = r.querySelectorAll('input');
      if (ins[0].value.trim()) products.push({ name: ins[0].value.trim(), coeff: ins[1].value });
    });
    if (!reactants.length || !products.length) { showError('Need at least 1 reactant and 1 product.'); return; }
    const d = await post('/api/limiting', { reactants, products });
    if (d.error) { showError(d.error); return; }
    let out = `Limiting: ${d.limiting}\n\nLeftovers (mol):\n`;
    for (const [k, v] of Object.entries(d.leftovers)) out += `  ${k}: ${v}\n`;
    out += `\nExpected yields (mol):\n`;
    for (const [k, v] of Object.entries(d.yields)) out += `  ${k}: ${v}\n`;
    showResult(out.trimEnd());
  },

  /* ── 5. Percent Composition ──────────────────────── */
  async 5() {
    const formula = val('pctFormula');
    if (!formula) { showError('Enter a formula.'); return; }
    const d = await post('/api/percent', { formula });
    if (d.error) { showError(d.error); return; }
    let out = `Formula: ${d.formula}\nMolar mass: ${d.molar_mass} g/mol\n\n`;
    for (const [el, pct] of Object.entries(d.percents)) out += `  ${el}: ${pct}%\n`;
    showResult(out.trimEnd());
  },

  /* ── 6. Volume / Mass ────────────────────────────── */
  async 6() {
    const t = val('volType'), a = val('vA'), b = val('vB');
    if (!a || !b) { showError('Enter both values.'); return; }
    const d = await post('/api/volume', { type: t, a, b });
    if (d.error) { showError(d.error); return; }
    showResult(`Result: ${d.result} ${d.unit}`);
  },

  /* ── 7. Oxidation Numbers ────────────────────────── */
  async 7() {
    const formula = val('oxFormula');
    const charge = parseInt(val('oxCharge') || '0');
    const peroxide = document.getElementById('oxPeroxide').checked;
    if (!formula) { showError('Enter a formula.'); return; }
    const d = await post('/api/oxidation', { formula, charge, peroxide });
    if (d.error) { showError(d.error); return; }
    let out = `Formula: ${d.formula}  Charge: ${d.charge}\n\nOxidation numbers:\n`;
    for (const [el, ox] of Object.entries(d.numbers)) out += `  ${el}: ${ox > 0 ? '+' : ''}${ox}\n`;
    showResult(out.trimEnd());
  },

  /* ── 8. Atom Economy ─────────────────────────────── */
  async 8() {
    const rRows = document.querySelectorAll('#aeRRows .dyn-row');
    const reactants = [];
    rRows.forEach(r => {
      const ins = r.querySelectorAll('input');
      if (ins[0].value.trim()) reactants.push({ formula: ins[0].value.trim(), coeff: ins[1].value });
    });
    const desF = val('aeDesiredFormula'), desC = val('aeDesiredCoeff');
    if (!reactants.length || !desF) { showError('Fill in reactants and desired product.'); return; }
    const d = await post('/api/atom_eco', { reactants, desired: { formula: desF, coeff: desC || '1' } });
    if (d.error) { showError(d.error); return; }
    showResult(
      `Atom Economy: ${d.atom_economy}%\nDesired MW: ${d.mw_desired} g/mol\nTotal reactant MW: ${d.mw_reactants} g/mol`
    );
  },

  /* ── 9. Ionic Bonding ────────────────────────────── */
  async 9() {
    const action = document.querySelector('input[name="ionicAction"]:checked').value;
    let body = { action };
    if (action === 'classify') {
      body.elem1 = val('ion1'); body.elem2 = val('ion2');
      if (!body.elem1 || !body.elem2) { showError('Enter both elements.'); return; }
    } else {
      body.cation = val('ionCat'); body.cation_charge = val('ionCatChg');
      body.anion  = val('ionAni'); body.anion_charge  = val('ionAniChg');
      if (!body.cation || !body.anion) { showError('Enter cation and anion.'); return; }
    }
    const d = await post('/api/ionic', body);
    if (d.error) { showError(d.error); return; }
    if (action === 'classify') {
      showResult(`${d.elem1} — ${d.elem2}\nEN difference: ${d.diff}\nBond type: ${d.bond_type}`);
    } else {
      showResult(`Ionic formula: ${d.formula}\n${d.cation}(${d.cation_charge > 0 ? '+' : ''}${d.cation_charge}) + ${d.anion}(${d.anion_charge})`);
    }
  },

  /* ── 10. Percentage Yield ────────────────────────── */
  async 10() {
    const t = val('yieldType'), a = val('yA'), b = val('yB');
    if (!a || !b) { showError('Enter both values.'); return; }
    const d = await post('/api/yield_calc', { type: t, a, b });
    if (d.error) { showError(d.error); return; }
    let out = `Result: ${d.result} ${d.unit}`;
    if (d.warning) out += `\n\nNote: ${d.warning}`;
    showResult(out);
  },

  /* ── 11. Periodic Table ──────────────────────────── */
  async 11() {
    const t = document.querySelector('input[name="perType"]:checked').value;
    const q = val('perQuery');
    if (!q) { showError('Enter a search query.'); return; }
    const d = await post('/api/periodic', { type: t, query: q });
    if (d.error) { showError(d.error); return; }
    if (!d.found) { showError('Element not found.'); return; }
    showResult(
      `${d.name}  (${d.symbol})\nAtomic number: ${d.number}\nAtomic weight: ${d.atomic_weight} g/mol`
    );
  },

  /* ── 12. Gas Laws ────────────────────────────────── */
  async 12() {
    const t = val('gasType');
    if (t === 'ideal') {
      const solve = val('gasIdealSolve');
      const body = { type: 'ideal', solve,
        n: val('gasN'), v: val('gasV'), T: val('gasT'), p: val('gasP') };
      const d = await post('/api/gas_laws', body);
      if (d.error) { showError(d.error); return; }
      showResult(`${solve} = ${d.result.toPrecision(5)} ${d.unit}\n(R = 0.08206 L·atm/mol·K)`);
    } else if (t === 'combined') {
      const solve = val('gasCombSolve');
      const body = { type: 'combined', solve,
        P1: val('gasP1'), V1: val('gasV1'), T1: val('gasT1'),
        P2: val('gasP2'), V2: val('gasV2'), T2: val('gasT2') };
      const d = await post('/api/gas_laws', body);
      if (d.error) { showError(d.error); return; }
      showResult(`${solve} = ${d.result.toPrecision(5)} ${d.unit}`);
    } else if (t === 'graham') {
      const d = await post('/api/gas_laws', { type: 'graham', M1: val('gasM1'), M2: val('gasM2') });
      if (d.error) { showError(d.error); return; }
      showResult(`Rate₁/Rate₂ = ${d.result.toPrecision(5)}\nGas 1 effuses ${d.result > 1 ? 'faster' : 'slower'} than Gas 2`);
    } else if (t === 'dalton') {
      const rows = document.querySelectorAll('#daltonRows .dyn-row');
      const gases = [];
      rows.forEach(r => {
        const ins = r.querySelectorAll('input');
        if (ins[1].value.trim()) gases.push({ name: ins[0].value.trim() || '?', p: ins[1].value });
      });
      if (!gases.length) { showError('Add at least one gas.'); return; }
      const d = await post('/api/gas_laws', { type: 'dalton', gases });
      if (d.error) { showError(d.error); return; }
      let out = `P_total = ${d.total.toPrecision(5)} atm\n\nPartial pressures:`;
      d.partials.forEach(g => { out += `\n  ${g.name}: ${Number(g.p).toPrecision(4)} atm`; });
      showResult(out);
    }
  },

  /* ── 13. Acid-Base ───────────────────────────────── */
  async 13() {
    const t = val('abType');
    let body = { type: t };
    if (t === 'ph_convert') {
      body.input_type = val('abConvInput');
      body.value = val('abVal');
      if (!body.value) { showError('Enter a value.'); return; }
    } else if (t === 'strong_acid' || t === 'strong_base') {
      body.conc = val('abConc');
      if (!body.conc) { showError('Enter concentration.'); return; }
    } else if (t === 'weak_acid') {
      body.Ka = val('abKa'); body.conc = val('abConc');
      if (!body.Ka || !body.conc) { showError('Enter Ka and concentration.'); return; }
    } else if (t === 'weak_base') {
      body.Kb = val('abKb'); body.conc = val('abConc');
      if (!body.Kb || !body.conc) { showError('Enter Kb and concentration.'); return; }
    } else if (t === 'buffer') {
      body.Ka = val('abKa'); body.acid = val('abAcid'); body.base = val('abBase');
      if (!body.Ka || !body.acid || !body.base) { showError('Enter Ka, [acid], and [base].'); return; }
    } else if (t === 'identify') {
      body.formula = val('abFormula');
      if (!body.formula) { showError('Enter a formula.'); return; }
    }
    const d = await post('/api/acid_base', body);
    if (d.error) { showError(d.error); return; }
    if (t === 'identify') { showResult(`${d.formula} → ${d.identity}`); return; }
    showResult(`pH  = ${d.pH.toFixed(4)}\npOH = ${d.pOH.toFixed(4)}\n[H⁺] = ${d.H.toExponential(3)} mol/L\n[OH⁻] = ${d.OH.toExponential(3)} mol/L${d.note ? '\n\n' + d.note : ''}`);
  },

  /* ── 14. Thermodynamics ──────────────────────────── */
  async 14() {
    const t = val('thermoType');
    let body = { type: t };
    if (t === 'calorimetry') {
      body.solve = val('calSolve');
      body.q = val('calQ'); body.m = val('calM'); body.c = val('calC'); body.dT = val('calDT');
      const d = await post('/api/thermo', body);
      if (d.error) { showError(d.error); return; }
      showResult(`${body.solve} = ${d.result.toPrecision(5)} ${d.unit}`);
    } else if (t === 'hess') {
      const rows = document.querySelectorAll('#hessRows .dyn-row');
      const steps = [];
      rows.forEach(r => {
        const ins = r.querySelectorAll('input');
        if (ins[0].value.trim()) steps.push({ dH: ins[0].value, mult: ins[1].value || '1' });
      });
      if (!steps.length) { showError('Add at least one step.'); return; }
      const d = await post('/api/thermo', { type: 'hess', steps });
      if (d.error) { showError(d.error); return; }
      showResult(`ΔH_rxn = ${d.result.toPrecision(5)} kJ/mol`);
    } else if (t === 'bond') {
      const brRows = document.querySelectorAll('#bondBrRows .dyn-row');
      const fmRows = document.querySelectorAll('#bondFmRows .dyn-row');
      const broken = [], formed = [];
      brRows.forEach(r => {
        const ins = r.querySelectorAll('input');
        if (ins[0].value.trim()) broken.push({ bond: ins[0].value.trim(), count: ins[1].value, kJ: ins[2].value });
      });
      fmRows.forEach(r => {
        const ins = r.querySelectorAll('input');
        if (ins[0].value.trim()) formed.push({ bond: ins[0].value.trim(), count: ins[1].value, kJ: ins[2].value });
      });
      if (!broken.length && !formed.length) { showError('Add at least one bond.'); return; }
      const d = await post('/api/thermo', { type: 'bond', broken, formed });
      if (d.error) { showError(d.error); return; }
      showResult(`ΔH = ${d.result.toPrecision(5)} kJ/mol\nBroken: ${d.sum_broken} kJ\nFormed: ${d.sum_formed} kJ`);
    } else if (t === 'gibbs') {
      const d = await post('/api/thermo', { type: 'gibbs', dH: val('gibbsDH'), dS: val('gibbsDS'), T: val('gibbsT') || '298.15' });
      if (d.error) { showError(d.error); return; }
      showResult(`ΔG = ${d.result.toPrecision(5)} kJ/mol\n${d.spontaneous ? 'Spontaneous (ΔG < 0)' : d.result === 0 ? 'Equilibrium (ΔG = 0)' : 'Non-spontaneous (ΔG > 0)'}`);
    }
  },

  /* ── 15. ICE Solver ──────────────────────────────── */
  async 15() {
    const rRows = document.querySelectorAll('#iceRRows .dyn-row');
    const pRows = document.querySelectorAll('#icePRows .dyn-row');
    const reactants = [], products = [];
    rRows.forEach(r => {
      const ins = r.querySelectorAll('input');
      if (ins[0].value.trim()) reactants.push({ name: ins[0].value.trim(), coeff: ins[1].value, initial: ins[2].value });
    });
    pRows.forEach(r => {
      const ins = r.querySelectorAll('input');
      if (ins[0].value.trim()) products.push({ name: ins[0].value.trim(), coeff: ins[1].value, initial: ins[2].value });
    });
    const Kc = val('iceKc');
    if (!reactants.length || !products.length) { showError('Need at least 1 reactant and 1 product.'); return; }
    if (!Kc) { showError('Enter Kc.'); return; }
    const d = await post('/api/ice', { reactants, products, Kc });
    if (d.error) { showError(d.error); return; }
    let out = `x = ${d.x.toExponential(4)}\nKc verified = ${d.Q_final.toPrecision(4)}\n5% check: ${d.approx_pct.toFixed(1)}% ${d.approx_pct < 5 ? '✓ approx. valid' : '✗ use quadratic'}\n\nEquilibrium concentrations:`;
    d.r_eq.forEach((c, i) => { out += `\n  ${d.r_names[i]}: ${c.toPrecision(5)} M`; });
    d.p_eq.forEach((c, i) => { out += `\n  ${d.p_names[i]}: ${c.toPrecision(5)} M`; });
    showResult(out);
  },

  /* ── 16. Electrochemistry ────────────────────────── */
  async 16() {
    const t = val('ecType');
    if (t === 'cell') {
      const d = await post('/api/electrochem', { type: 'cell', E_cat: val('ecCat'), E_ano: val('ecAno'), n: val('ecN') });
      if (d.error) { showError(d.error); return; }
      showResult(`E°cell = ${d.E_cell.toFixed(4)} V\nΔG° = ${d.dG.toFixed(2)} kJ/mol\n${d.spontaneity} (${d.cell_type})`);
    } else if (t === 'faraday') {
      const solve = val('farSolve');
      const d = await post('/api/electrochem', { type: 'faraday', solve,
        mass: val('farMass'), I: val('farI'), t: val('farT'), M: val('farM'), n: val('farN') });
      if (d.error) { showError(d.error); return; }
      showResult(`${solve} = ${d.result.toPrecision(5)} ${d.unit}`);
    } else if (t === 'nernst') {
      const d = await post('/api/electrochem', { type: 'nernst',
        E0: val('nernstE0'), n: val('nernstN'), Q: val('nernstQ'), T: val('nernstT') || '298.15' });
      if (d.error) { showError(d.error); return; }
      showResult(`E = ${d.E.toFixed(4)} V\nE°cell = ${Number(val('nernstE0')).toFixed(4)} V\nQ = ${val('nernstQ')}\nT = ${val('nernstT') || '298.15'} K`);
    }
  },

  /* ── 17. Kinetics ────────────────────────────────── */
  async 17() {
    const t = val('kinType');
    if (t === 'order') {
      const d = await post('/api/kinetics', { type: 'order',
        c1: val('kinC1'), c2: val('kinC2'), r1: val('kinR1'), r2: val('kinR2') });
      if (d.error) { showError(d.error); return; }
      showResult(`Reaction order = ${d.order.toFixed(3)} (≈ ${Math.round(d.order)})\nk = ${d.k.toExponential(4)} ${d.k_units}`);
    } else if (t === 'arrhenius') {
      const solve = val('arrSolve');
      const d = await post('/api/kinetics', { type: 'arrhenius', solve,
        k1: val('arrK1'), T1: val('arrT1'), k2: val('arrK2'), T2: val('arrT2'), Ea: val('arrEa') });
      if (d.error) { showError(d.error); return; }
      if (solve === 'Ea') showResult(`Ea = ${d.Ea_kJ.toFixed(2)} kJ/mol\n   = ${d.Ea_J.toFixed(0)} J/mol`);
      else               showResult(`k₂ = ${d.k2.toExponential(4)} at T₂ = ${val('arrT2')} K`);
    } else if (t === 'halflife') {
      const solve = val('hlSolve');
      const d = await post('/api/kinetics', { type: 'halflife', solve, k: val('hlK'), t_half: val('hlT') });
      if (d.error) { showError(d.error); return; }
      if (solve === 't_half') showResult(`t½ = ${d.t_half.toPrecision(5)} s\n   = ${(d.t_half / 60).toPrecision(4)} min`);
      else                   showResult(`k = ${d.k.toExponential(4)} s⁻¹`);
    } else if (t === 'kunits') {
      const d = await post('/api/kinetics', { type: 'kunits', order: val('kinOrder') });
      if (d.error) { showError(d.error); return; }
      showResult(`Order ${d.order}: k units = ${d.units}`);
    }
  },
};
</script>
</body>
</html>
