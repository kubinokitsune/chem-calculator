<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemistry Calculator</title>
  <style>
    /* ── Fonts ─────────────────────────────────────────── */
    @font-face {
      font-family: 'VT323';
      src: url('fonts/VT323/VT323-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Share Tech Mono';
      src: url('fonts/ShareTechMono/ShareTechMono-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    /* ── CSS Custom Properties ─────────────────────────── */
    :root {
      /* Fonts */
      --font-display: 'VT323', monospace;
      --font-body:    'Share Tech Mono', monospace;
      /* Backgrounds */
      --bg-primary:    #0f1117;
      --bg-secondary:  #1a1d2e;
      --bg-tertiary:   #252838;
      /* Text */
      --text-primary:  #c8cce8;
      --text-secondary:#6b6f8a;
      /* Accent (overridable by user) */
      --accent:        #3b82f6;
      --accent-hover:  #2563eb;
      --accent-subtle: rgba(59,130,246,0.13);
      /* Semantic */
      --border:        #2a2d3e;
      --error:         #ff4444;
      --success:       #33ff66;
      --warning:       #f59e0b;
      /* LCD screen */
      --screen-bg:     #0a1a0a;
      --screen-fg:     #33ff66;
      --screen-dim:    #1a8a33;
      /* Calculate button */
      --btn-calc:      #1e3d1e;
      --btn-calc-fg:   #5dff7a;
      /* Shadow */
      --shadow:        0 8px 32px rgba(0,0,0,0.6);
    }
    [data-theme="light"] {
      --bg-primary:    #d4d8e8;
      --bg-secondary:  #e8eaf6;
      --bg-tertiary:   #d0d4e8;
      --text-primary:  #1a1d3a;
      --text-secondary:#6060a0;
      /* accent stays — user-chosen, no override */
      --border:        #b0b4c8;
      --error:         #cc0000;
      --success:       #1a6a1a;
      --warning:       #d97706;
      --screen-bg:     #c8d4c0;
      --screen-fg:     #1a3a1a;
      --screen-dim:    #4a7a4a;
      --btn-calc:      #b0d4b0;
      --btn-calc-fg:   #1a3a1a;
      --shadow:        0 8px 32px rgba(0,0,0,0.15);
    }

    /* ── Reset / Base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 20px 8px 40px;
      font-family: var(--font-body);
      transition: background 0.3s, color 0.3s;
    }

    /* ── Calculator Shell ──────────────────────────────── */
    .calc {
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow);
      padding: 16px 14px 20px;
      transition: background 0.3s, border-color 0.3s;
    }

    /* ── Header ────────────────────────────────────────── */
    .calc-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 1px;
      color: var(--text-secondary);
      text-transform: uppercase;
      line-height: 1;
    }
    .brand span { color: var(--accent); }
    .header-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .accent-picker {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .accent-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      transition: border-color 0.15s, transform 0.1s;
      outline: none;
    }
    .accent-dot:hover { transform: scale(1.25); }
    .accent-dot.active { border-color: var(--text-primary); }
    .theme-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 4px 10px;
      font-family: var(--font-body);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .theme-btn:hover { background: var(--accent); color: #fff; }

    /* ── LCD Screen ────────────────────────────────────── */
    .screen {
      background: var(--bg-tertiary);
      border: 2px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 10px 12px 10px 16px;
      margin-bottom: 12px;
      min-height: 80px;
      position: relative;
      overflow: hidden;
      transition: border-left-color 0.2s;
    }
    .screen-label {
      font-family: var(--font-display);
      font-size: 17px;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .screen-content {
      font-family: var(--font-display);
      font-size: 21px;
      color: var(--accent);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.35;
      min-height: 40px;
    }
    .screen-content.error { color: var(--error); }
    .screen-warnings {
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--warning);
      margin-top: 6px;
      white-space: pre-wrap;
      display: none;
    }
    .screen-prompt {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Module Grid ───────────────────────────────────── */
    .mod-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      margin-bottom: 12px;
    }
    .mod-label {
      grid-column: 1 / -1;
      font-family: var(--font-display);
      font-size: 17px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 14px;
      margin-bottom: 3px;
      padding-bottom: 3px;
      border-bottom: 1px solid var(--border);
      line-height: 1;
    }
    .mod-label:first-child { margin-top: 0; }
    .mod-btn {
      background: var(--accent-subtle);
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 4px;
      font-family: var(--font-body);
      font-size: 13px;
      text-align: center;
      cursor: pointer;
      line-height: 1.3;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      user-select: none;
    }
    .mod-btn:hover { background: var(--accent); color: #fff; }
    .mod-btn.active { background: var(--accent); color: #fff; font-weight: 700; }
    .mod-btn:active { transform: scale(0.95); }
    /* Single-button sections: span 2 of 3 columns (~50-66% width) */
    .mod-btn.solo { grid-column: span 2; }

    /* ── Input Panel ───────────────────────────────────── */
    .input-panel {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 10px 6px;
      margin-bottom: 10px;
      min-height: 60px;
    }
    .panel-title {
      font-family: var(--font-display);
      font-size: 17px;
      letter-spacing: 1px;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 8px;
      line-height: 1;
    }
    .field-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .field-row label {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-secondary);
      min-width: 80px;
      flex-shrink: 0;
    }
    .field-row input,
    .field-row select,
    .field-row textarea {
      flex: 1;
      min-width: 0;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 7px;
      font-family: var(--font-body);
      font-size: 13px;
      transition: border-color 0.2s;
      outline: none;
    }
    .field-row input:focus,
    .field-row select:focus,
    .field-row textarea:focus { border-color: var(--accent); }
    .field-row textarea { resize: vertical; min-height: 32px; font-size: 11px; }

    .dynamic-rows { margin-top: 4px; }
    .dyn-row {
      display: flex;
      gap: 5px;
      margin-bottom: 5px;
      align-items: center;
      flex-wrap: wrap;
    }
    .dyn-row input {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 6px;
      font-family: var(--font-body);
      font-size: 12px;
      outline: none;
    }
    .dyn-row input:focus { border-color: var(--accent); }
    .dyn-row input.w-sm { width: 52px; }
    .dyn-row input.w-md { width: 80px; }
    .dyn-row input.w-lg { width: 110px; }
    .dyn-row .dyn-label { font-family: var(--font-body); font-size: 11px; color: var(--text-secondary); }
    .add-row-btn, .rem-row-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: var(--font-body);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }
    .rem-row-btn:hover { border-color: var(--error); color: var(--error); }

    .radio-row {
      display: flex;
      gap: 12px;
      margin-bottom: 6px;
    }
    .radio-row label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
    }

    /* ── Calculate Button ──────────────────────────────── */
    .calc-btn {
      width: 100%;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      opacity: 0.7;
      cursor: not-allowed;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: normal;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: background 0.2s ease, color 0.2s ease, opacity 0.2s ease, transform 0.1s;
    }
    .calc-btn.ready {
      background: var(--accent);
      color: var(--bg-primary);
      opacity: 1;
      cursor: pointer;
    }
    .calc-btn.ready:hover { background: var(--accent-hover); }
    .calc-btn.ready:active { transform: scale(0.98); }
    .calc-btn.loading {
      background: var(--accent-subtle);
      color: var(--accent);
      opacity: 0.8;
      cursor: wait;
      animation: btn-pulse 1.2s ease-in-out infinite;
    }
    @keyframes btn-pulse {
      0%, 100% { opacity: 0.8; }
      50%       { opacity: 0.45; }
    }

    /* ── Utility ───────────────────────────────────────── */
    .hidden { display: none !important; }
    .sep { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  </style>
</head>
<body>

<div class="calc">

  <!-- Header -->
  <div class="calc-header">
    <div class="brand"><span>Chem</span>Calc FX-17</div>
    <div class="header-controls">
      <div class="accent-picker" id="accentPicker">
        <button class="accent-dot" style="background:#3b82f6" data-accent="#3b82f6" data-hover="#2563eb" onclick="setAccent(this)" title="Blue"></button>
        <button class="accent-dot" style="background:#06b6d4" data-accent="#06b6d4" data-hover="#0891b2" onclick="setAccent(this)" title="Cyan"></button>
        <button class="accent-dot" style="background:#10b981" data-accent="#10b981" data-hover="#059669" onclick="setAccent(this)" title="Green"></button>
        <button class="accent-dot" style="background:#8b5cf6" data-accent="#8b5cf6" data-hover="#7c3aed" onclick="setAccent(this)" title="Purple"></button>
        <button class="accent-dot" style="background:#f97316" data-accent="#f97316" data-hover="#ea6c00" onclick="setAccent(this)" title="Orange"></button>
        <button class="accent-dot" style="background:#ef4444" data-accent="#ef4444" data-hover="#dc2626" onclick="setAccent(this)" title="Red"></button>
      </div>
      <button class="theme-btn" id="outputModeBtn" onclick="toggleOutputMode()">≡ Detail</button>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀ Light</button>
    </div>
  </div>

  <!-- LCD Screen -->
  <div class="screen">
    <div class="screen-label">Output</div>
    <div class="screen-content" id="screenOut">Select a module below.</div>
    <div class="screen-warnings" id="screenWarnings"></div>
    <div class="screen-prompt" id="screenPrompt"></div>
  </div>

  <!-- Module Selector Grid -->
  <div class="mod-grid">
    <div class="mod-label">Stoichiometry</div>
    <button class="mod-btn" data-mod="1"  onclick="selectMod(1)">Mole Conv.</button>
    <button class="mod-btn" data-mod="2"  onclick="selectMod(2)">Empirical Formula</button>
    <button class="mod-btn" data-mod="4"  onclick="selectMod(4)">Lim. Reactant</button>
    <button class="mod-btn" data-mod="5"  onclick="selectMod(5)">% Comp.</button>
    <button class="mod-btn" data-mod="8"  onclick="selectMod(8)">Atom Economy</button>
    <button class="mod-btn" data-mod="10" onclick="selectMod(10)">% Yield</button>

    <div class="mod-label">Structure &amp; Bonding</div>
    <button class="mod-btn" data-mod="7"  onclick="selectMod(7)">Oxidation #</button>
    <button class="mod-btn" data-mod="9"  onclick="selectMod(9)">Ionic Bond</button>
    <button class="mod-btn" data-mod="11" onclick="selectMod(11)">Periodic Table</button>

    <div class="mod-label">Energetics</div>
    <button class="mod-btn solo" data-mod="14" onclick="selectMod(14)">Thermodynamics</button>

    <div class="mod-label">Kinetics</div>
    <button class="mod-btn solo" data-mod="17" onclick="selectMod(17)">Kinetics</button>

    <div class="mod-label">Equilibrium</div>
    <button class="mod-btn solo" data-mod="15" onclick="selectMod(15)">ICE Solver</button>

    <div class="mod-label">Acids &amp; Bases</div>
    <button class="mod-btn solo" data-mod="13" onclick="selectMod(13)">Acid-Base</button>

    <div class="mod-label">Electrochemistry</div>
    <button class="mod-btn solo" data-mod="16" onclick="selectMod(16)">Electrochemistry</button>

    <div class="mod-label">Tools</div>
    <button class="mod-btn" data-mod="3"  onclick="selectMod(3)">Eqn Balancer</button>
    <button class="mod-btn" data-mod="6"  onclick="selectMod(6)">Vol/Mass</button>
    <button class="mod-btn" data-mod="12" onclick="selectMod(12)">Gas Laws</button>
  </div>

  <!-- Input Panel (changes per module) -->
  <div class="input-panel" id="inputPanel">
    <div class="panel-title" id="panelTitle">No module selected</div>
    <div id="panelBody"></div>
  </div>

  <!-- Calculate -->
  <button class="calc-btn" onclick="calculate()">= Calculate</button>

</div>

<script>
/* ════════════════════════════════════════════════════════
   Theme + Accent persistence
════════════════════════════════════════════════════════ */
function loadPreferences() {
  // Theme
  const savedTheme = localStorage.getItem('ccTheme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀ Light' : '☽ Dark';

  // Accent
  const savedAccent = localStorage.getItem('ccAccent');
  const savedHover  = localStorage.getItem('ccAccentHover');
  if (savedAccent) {
    applyAccent(savedAccent, savedHover || savedAccent);
    document.querySelectorAll('.accent-dot').forEach(d => {
      d.classList.toggle('active', d.dataset.accent === savedAccent);
    });
  } else {
    const first = document.querySelector('.accent-dot');
    if (first) first.classList.add('active');
  }

  // Output mode — must run after DOM is ready so the button exists
  const savedMode = localStorage.getItem('outputMode') || 'detailed';
  document.getElementById('outputModeBtn').textContent =
    savedMode === 'compact' ? '◼ Compact' : '≡ Detail';
}

function toggleTheme() {
  const html  = document.documentElement;
  const isNowDark = html.getAttribute('data-theme') !== 'dark';
  const theme = isNowDark ? 'dark' : 'light';
  html.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀ Light' : '☽ Dark';
  localStorage.setItem('ccTheme', theme);
}

function applyAccent(color, hover) {
  const root = document.documentElement.style;
  root.setProperty('--accent', color);
  root.setProperty('--accent-hover', hover);
  // Parse RGB for the subtle tint
  const r = parseInt(color.slice(1,3), 16);
  const g = parseInt(color.slice(3,5), 16);
  const b = parseInt(color.slice(5,7), 16);
  root.setProperty('--accent-subtle', `rgba(${r},${g},${b},0.13)`);
}

function setAccent(btn) {
  const color = btn.dataset.accent;
  const hover = btn.dataset.hover;
  applyAccent(color, hover);
  localStorage.setItem('ccAccent', color);
  localStorage.setItem('ccAccentHover', hover);
  document.querySelectorAll('.accent-dot').forEach(d => d.classList.remove('active'));
  btn.classList.add('active');
}

// Apply saved preferences before first render
loadPreferences();

/* ════════════════════════════════════════════════════════
   Output detail mode
════════════════════════════════════════════════════════ */
function getOutputMode() {
  return localStorage.getItem('outputMode') || 'detailed';
}

function applyOutputMode(mode) {
  document.getElementById('outputModeBtn').textContent =
    mode === 'compact' ? '◼ Compact' : '≡ Detail';
}

function toggleOutputMode() {
  const next = getOutputMode() === 'detailed' ? 'compact' : 'detailed';
  localStorage.setItem('outputMode', next);
  applyOutputMode(next);
}

/* Show result using compact string or detailed steps array based on current mode.
   compact  : string  — one-line answer with units
   detailed : array   — each entry is one step of the working
   warnings : array   — edge case notices shown in amber below the result */
function showOutput(compact, detailed, warnings) {
  const mode = getOutputMode();
  if (mode === 'compact' || !Array.isArray(detailed) || detailed.length === 0) {
    showResult(compact);
  } else {
    const numbered = detailed.map((line, i) => `${i + 1}. ${line}`).join('\n');
    showResult(numbered);
  }
  const w = document.getElementById('screenWarnings');
  if (Array.isArray(warnings) && warnings.length > 0) {
    w.textContent = warnings.map(s => `⚠ ${s}`).join('\n');
    w.style.display = 'block';
  } else {
    w.textContent = ''; w.style.display = 'none';
  }
}

/* ════════════════════════════════════════════════════════
   Calculate button state
════════════════════════════════════════════════════════ */
const _btn = () => document.querySelector('.calc-btn');

function checkButtonState() {
  if (!currentMod) { _setReady(false); return; }
  // Check all text/number inputs inside .field-row (primary required inputs).
  // Selects always have a value. Dynamic rows (.dyn-row) are not required.
  const primary = document.querySelectorAll('#panelBody .field-row input[type="text"], #panelBody .field-row input[type="number"], #panelBody .field-row input:not([type])');
  const allFilled = Array.from(primary).every(el => el.value.trim() !== '');
  _setReady(allFilled);
}

function _setReady(yes) {
  const b = _btn();
  if (b.classList.contains('loading')) return; // don't override loading state
  b.classList.toggle('ready', yes);
  b.textContent = '= Calculate';
}

function setButtonLoading() {
  const b = _btn();
  b.classList.remove('ready');
  b.classList.add('loading');
  b.textContent = 'Calculating…';
}

function setButtonDone() {
  const b = _btn();
  b.classList.remove('loading');
  b.textContent = '= Calculate';
  checkButtonState();
}

// Delegate input events from the whole panel so dynamic rows are also covered
document.getElementById('inputPanel').addEventListener('input', checkButtonState);

/* ════════════════════════════════════════════════════════
   Screen output helpers
════════════════════════════════════════════════════════ */
function showResult(text) {
  const el = document.getElementById('screenOut');
  el.textContent = text;
  el.className = 'screen-content';
  document.getElementById('screenPrompt').textContent = '';
  const w = document.getElementById('screenWarnings');
  w.style.display = 'none'; w.textContent = '';
}
function showError(text) {
  const el = document.getElementById('screenOut');
  el.textContent = 'ERROR: ' + text;
  el.className = 'screen-content error';
  document.getElementById('screenPrompt').textContent = '';
  const w = document.getElementById('screenWarnings');
  w.style.display = 'none'; w.textContent = '';
}
function showPrompt(text) {
  document.getElementById('screenPrompt').textContent = text;
}

/* ════════════════════════════════════════════════════════
   Module selector
════════════════════════════════════════════════════════ */
let currentMod = 0;
const MOD_NAMES = {
  1:  'Mole Conversions',
  2:  'Empirical Formula',
  3:  'Equation Balancer',
  4:  'Limiting Reactant',
  5:  'Percent Composition',
  6:  'Volume / Mass',
  7:  'Oxidation Numbers',
  8:  'Atom Economy',
  9:  'Ionic Bonding',
  10: 'Percentage Yield',
  11: 'Periodic Table',
  12: 'Gas Laws',
  13: 'Acid-Base',
  14: 'Thermodynamics',
  15: 'ICE Solver',
  16: 'Electrochemistry',
  17: 'Kinetics',
};

function selectMod(n) {
  currentMod = n;
  document.querySelectorAll('.mod-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.mod) === n);
  });
  document.getElementById('panelTitle').textContent = MOD_NAMES[n];
  renderPanel(n);
  showResult(MOD_NAMES[n]);
  showPrompt('Enter values and press = Calculate');
  checkButtonState();
}

/* ════════════════════════════════════════════════════════
   Panel renderers
════════════════════════════════════════════════════════ */
function renderPanel(n) {
  const body = document.getElementById('panelBody');
  body.innerHTML = '';
  const fn = PANELS[n];
  if (fn) fn(body);
}

const PANELS = {
  /* ── 1. Mole Conversions ─────────────────────────── */
  1(body) {
    body.innerHTML = `
      <div class="field-row">
        <label>Conversion</label>

/* ════════════════════════════════════════════════════════
   API helpers
════════════════════════════════════════════════════════ */
async function post(url, data) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  return res.json();
}

function val(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

/* ════════════════════════════════════════════════════════
   Calculate dispatcher
════════════════════════════════════════════════════════ */
async function calculate() {
  if (!currentMod) { showError('Select a module first.'); return; }
  if (!_btn().classList.contains('ready')) return;
  setButtonLoading();
  try {
    await CALCS[currentMod]();
  } catch(e) {
    showError(e.message || String(e));
  } finally {
    setButtonDone();
  }
}

const CALCS = {
  /* ── 1. Mole Conversions ─────────────────────────── */
  async 1() {
    const t = val('moleType');
    const a = val('mA');
    const b = document.getElementById('mB') ? val('mB') : null;
    if (!a) { showError('Enter a value.'); return; }
    const body = { type: t, a };
    if (b !== null) body.b = b;
    const d = await post('/api/mole', body);
    if (d.error) { showError(d.error); return; }
    showOutput(d.compact, d.detailed, d.warnings || []);
    showPrompt('');
  },

  /* ── 2. Empirical Formula ────────────────────────── */
  async 2() {
    const rows = document.querySelectorAll('#empRows .dyn-row');
    const elements = [], masses = [];
    rows.forEach(r => {
      const ins = r.querySelectorAll('input');
      if (ins[0].value.trim()) {
        elements.push(ins[0].value.trim());
        masses.push(ins[1].value.trim());
      }
    });
    if (elements.length < 1) { showError('Add at least one element.'); return; }
    const d = await post('/api/empirical', { elements, masses });
    if (d.error) { showError(d.error); return; }
    showOutput(d.compact, d.detailed, d.warnings || []);
  },

    showOutput(d.compact, d.detailed, d.warnings || []);

      body.cation = val('ionCat'); body.cation_charge = val('ionCatChg');

  /* ── 10. Percentage Yield ────────────────────────── */
  async 10() {

    if (d.error) { showError(d.error); return; }
    showOutput(d.compact, d.detailed, d.warnings || []);
  },

  async 11() {
    const t = document.querySelector('input[name="perType"]:checked').value;
    const q = val('perQuery');
    if (!q) { showError('Enter a search query.'); return; }
    const d = await post('/api/periodic', { type: t, query: q });
    if (d.error) { showError(d.error); return; }
    if (!d.found) { showError('Element not found.'); return; }
    showOutput(d.compact, d.detailed, d.warnings || []);
  },

  /* ── 12. Gas Laws ────────────────────────────────── */
  async 12() {
    const t = val('gasType');
    if (t === 'ideal') {
      const solve = val('gasIdealSolve');
      const body = { type: 'ideal', solve,
        n: val('gasN'), v: val('gasV'), T: val('gasT'), p: val('gasP') };
      const d = await post('/api/gas_laws', body);
      if (d.error) { showError(d.error); return; }
      showResult(`${solve} = ${d.result.toPrecision(5)} ${d.unit}\n(R = 0.08206 L·atm/mol·K)`);
    } else if (t === 'combined') {
      const solve = val('gasCombSolve');
      const body = { type: 'combined', solve,
        P1: val('gasP1'), V1: val('gasV1'), T1: val('gasT1'),
        P2: val('gasP2'), V2: val('gasV2'), T2: val('gasT2') };
      const d = await post('/api/gas_laws', body);
      if (d.error) { showError(d.error); return; }
      showResult(`${solve} = ${d.result.toPrecision(5)} ${d.unit}`);
    } else if (t === 'graham') {
      const d = await post('/api/gas_laws', { type: 'graham', M1: val('gasM1'), M2: val('gasM2') });
      if (d.error) { showError(d.error); return; }
      showResult(`Rate₁/Rate₂ = ${d.result.toPrecision(5)}\nGas 1 effuses ${d.result > 1 ? 'faster' : 'slower'} than Gas 2`);
    } else if (t === 'dalton') {
      const rows = document.querySelectorAll('#daltonRows .dyn-row');
      const gases = [];
      rows.forEach(r => {
        const ins = r.querySelectorAll('input');
        if (ins[1].value.trim()) gases.push({ name: ins[0].value.trim() || '?', p: ins[1].value });
      });
      if (!gases.length) { showError('Add at least one gas.'); return; }
      const d = await post('/api/gas_laws', { type: 'dalton', gases });
      if (d.error) { showError(d.error); return; }
      let out = `P_total = ${d.total.toPrecision(5)} atm\n\nPartial pressures:`;
      d.partials.forEach(g => { out += `\n  ${g.name}: ${Number(g.p).toPrecision(4)} atm`; });
      showResult(out);
    }
  },

  /* ── 13. Acid-Base ───────────────────────────────── */
  async 13() {
    const t = val('abType');
    let body = { type: t };
    if (t === 'ph_convert') {
      body.input_type = val('abConvInput');
      body.value = val('abVal');
      if (!body.value) { showError('Enter a value.'); return; }
    } else if (t === 'strong_acid' || t === 'strong_base') {
      body.conc = val('abConc');
      if (!body.conc) { showError('Enter concentration.'); return; }
    } else if (t === 'weak_acid') {
      body.Ka = val('abKa'); body.conc = val('abConc');
      if (!body.Ka || !body.conc) { showError('Enter Ka and concentration.'); return; }
    } else if (t === 'weak_base') {
      body.Kb = val('abKb'); body.conc = val('abConc');
      if (!body.Kb || !body.conc) { showError('Enter Kb and concentration.'); return; }
    } else if (t === 'buffer') {
      body.Ka = val('abKa'); body.acid = val('abAcid'); body.base = val('abBase');
      if (!body.Ka || !body.acid || !body.base) { showError('Enter Ka, [acid], and [base].'); return; }
    } else if (t === 'identify') {
      body.formula = val('abFormula');
      if (!body.formula) { showError('Enter a formula.'); return; }
    }
    const d = await post('/api/acid_base', body);
    if (d.error) { showError(d.error); return; }
    if (t === 'identify') { showResult(`${d.formula} → ${d.identity}`); return; }
    showResult(`pH  = ${d.pH.toFixed(4)}\npOH = ${d.pOH.toFixed(4)}\n[H⁺] = ${d.H.toExponential(3)} mol/L\n[OH⁻] = ${d.OH.toExponential(3)} mol/L${d.note ? '\n\n' + d.note : ''}`);
  },

  /* ── 14. Thermodynamics ──────────────────────────── */
  async 14() {
    const t = val('thermoType');
    let body = { type: t };
    if (t === 'calorimetry') {
      body.solve = val('calSolve');
      body.q = val('calQ'); body.m = val('calM'); body.c = val('calC'); body.dT = val('calDT');
      const d = await post('/api/thermo', body);
      if (d.error) { showError(d.error); return; }
      showResult(`${body.solve} = ${d.result.toPrecision(5)} ${d.unit}`);
    } else if (t === 'hess') {
      const rows = document.querySelectorAll('#hessRows .dyn-row');
      const steps = [];
      rows.forEach(r => {
        const ins = r.querySelectorAll('input');
        if (ins[0].value.trim()) steps.push({ dH: ins[0].value, mult: ins[1].value || '1' });
      });
      if (!steps.length) { showError('Add at least one step.'); return; }
      const d = await post('/api/thermo', { type: 'hess', steps });
      if (d.error) { showError(d.error); return; }
      showResult(`ΔH_rxn = ${d.result.toPrecision(5)} kJ/mol`);
    } else if (t === 'bond') {
      const brRows = document.querySelectorAll('#bondBrRows .dyn-row');
      const fmRows = document.querySelectorAll('#bondFmRows .dyn-row');
      const broken = [], formed = [];
      brRows.forEach(r => {
        const ins = r.querySelectorAll('input');
        if (ins[0].value.trim()) broken.push({ bond: ins[0].value.trim(), count: ins[1].value, kJ: ins[2].value });
      });
      fmRows.forEach(r => {
        const ins = r.querySelectorAll('input');
        if (ins[0].value.trim()) formed.push({ bond: ins[0].value.trim(), count: ins[1].value, kJ: ins[2].value });
      });
      if (!broken.length && !formed.length) { showError('Add at least one bond.'); return; }
      const d = await post('/api/thermo', { type: 'bond', broken, formed });
      if (d.error) { showError(d.error); return; }
      showResult(`ΔH = ${d.result.toPrecision(5)} kJ/mol\nBroken: ${d.sum_broken} kJ\nFormed: ${d.sum_formed} kJ`);
    } else if (t === 'gibbs') {
      const d = await post('/api/thermo', { type: 'gibbs', dH: val('gibbsDH'), dS: val('gibbsDS'), T: val('gibbsT') || '298.15' });
      if (d.error) { showError(d.error); return; }
      showResult(`ΔG = ${d.result.toPrecision(5)} kJ/mol\n${d.spontaneous ? 'Spontaneous (ΔG < 0)' : d.result === 0 ? 'Equilibrium (ΔG = 0)' : 'Non-spontaneous (ΔG > 0)'}`);
    }
  },

  /* ── 15. ICE Solver ──────────────────────────────── */
  async 15() {
    const rRows = document.querySelectorAll('#iceRRows .dyn-row');
    const pRows = document.querySelectorAll('#icePRows .dyn-row');
    const reactants = [], products = [];
    rRows.forEach(r => {
      const ins = r.querySelectorAll('input');
      if (ins[0].value.trim()) reactants.push({ name: ins[0].value.trim(), coeff: ins[1].value, initial: ins[2].value });
    });
    pRows.forEach(r => {
      const ins = r.querySelectorAll('input');
      if (ins[0].value.trim()) products.push({ name: ins[0].value.trim(), coeff: ins[1].value, initial: ins[2].value });
    });
    const Kc = val('iceKc');
    if (!reactants.length || !products.length) { showError('Need at least 1 reactant and 1 product.'); return; }
    if (!Kc) { showError('Enter Kc.'); return; }
    const d = await post('/api/ice', { reactants, products, Kc });
    if (d.error) { showError(d.error); return; }
    let out = `x = ${d.x.toExponential(4)}\nKc verified = ${d.Q_final.toPrecision(4)}\n5% check: ${d.approx_pct.toFixed(1)}% ${d.approx_pct < 5 ? '✓ approx. valid' : '✗ use quadratic'}\n\nEquilibrium concentrations:`;
    d.r_eq.forEach((c, i) => { out += `\n  ${d.r_names[i]}: ${c.toPrecision(5)} M`; });
    d.p_eq.forEach((c, i) => { out += `\n  ${d.p_names[i]}: ${c.toPrecision(5)} M`; });
    showResult(out);
  },

  /* ── 16. Electrochemistry ────────────────────────── */
  async 16() {
    const t = val('ecType');
    if (t === 'cell') {
      const d = await post('/api/electrochem', { type: 'cell', E_cat: val('ecCat'), E_ano: val('ecAno'), n: val('ecN') });
      if (d.error) { showError(d.error); return; }
      showResult(`E°cell = ${d.E_cell.toFixed(4)} V\nΔG° = ${d.dG.toFixed(2)} kJ/mol\n${d.spontaneity} (${d.cell_type})`);
    } else if (t === 'faraday') {
      const solve = val('farSolve');
      const d = await post('/api/electrochem', { type: 'faraday', solve,
        mass: val('farMass'), I: val('farI'), t: val('farT'), M: val('farM'), n: val('farN') });
      if (d.error) { showError(d.error); return; }
      showResult(`${solve} = ${d.result.toPrecision(5)} ${d.unit}`);
    } else if (t === 'nernst') {
      const d = await post('/api/electrochem', { type: 'nernst',
        E0: val('nernstE0'), n: val('nernstN'), Q: val('nernstQ'), T: val('nernstT') || '298.15' });
      if (d.error) { showError(d.error); return; }
      showResult(`E = ${d.E.toFixed(4)} V\nE°cell = ${Number(val('nernstE0')).toFixed(4)} V\nQ = ${val('nernstQ')}\nT = ${val('nernstT') || '298.15'} K`);
    }
  },

  /* ── 17. Kinetics ────────────────────────────────── */
  async 17() {
    const t = val('kinType');
    if (t === 'order') {
      const d = await post('/api/kinetics', { type: 'order',
        c1: val('kinC1'), c2: val('kinC2'), r1: val('kinR1'), r2: val('kinR2') });
      if (d.error) { showError(d.error); return; }
      showResult(`Reaction order = ${d.order.toFixed(3)} (≈ ${Math.round(d.order)})\nk = ${d.k.toExponential(4)} ${d.k_units}`);
    } else if (t === 'arrhenius') {
      const solve = val('arrSolve');
      const d = await post('/api/kinetics', { type: 'arrhenius', solve,
        k1: val('arrK1'), T1: val('arrT1'), k2: val('arrK2'), T2: val('arrT2'), Ea: val('arrEa') });
      if (d.error) { showError(d.error); return; }
      if (solve === 'Ea') showResult(`Ea = ${d.Ea_kJ.toFixed(2)} kJ/mol\n   = ${d.Ea_J.toFixed(0)} J/mol`);
      else               showResult(`k₂ = ${d.k2.toExponential(4)} at T₂ = ${val('arrT2')} K`);
    } else if (t === 'halflife') {
      const solve = val('hlSolve');
      const d = await post('/api/kinetics', { type: 'halflife', solve, k: val('hlK'), t_half: val('hlT') });
      if (d.error) { showError(d.error); return; }
      if (solve === 't_half') showResult(`t½ = ${d.t_half.toPrecision(5)} s\n   = ${(d.t_half / 60).toPrecision(4)} min`);
      else                   showResult(`k = ${d.k.toExponential(4)} s⁻¹`);
    } else if (t === 'kunits') {
      const d = await post('/api/kinetics', { type: 'kunits', order: val('kinOrder') });
      if (d.error) { showError(d.error); return; }
      showResult(`Order ${d.order}: k units = ${d.units}`);
    }
  },
};
</script>
</body>
</html>
